name: Sync Power BI Workspace with Git

on:
  push:
    branches:
      - main

jobs:
  sync-workspace:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install msal urllib3

      - name: Run Fabric workspace sync
        env:
          PBI_WORKSPACE_ID: ${{ vars.PBI_WORKSPACE_ID }}
          PBI_CONNECTION_ID: ${{ vars.PBI_CONNECTION_ID }}
          PBI_TENANT_ID: ${{ vars.PBI_TENANT_ID }}
          PBI_CLIENT_ID: ${{ vars.PBI_CLIENT_ID }}
          PBI_CLIENT_SECRET: ${{ secrets.PBI_CLIENT_SECRET }}
        run: |
          python scripts/sync_workspace.py